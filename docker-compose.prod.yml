version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gestor_backend
    restart: always
    environment:
      - USE_SQLITE=true
      - SQLITE_PATH=/app/data/gestor_turnos.db
    ports:
      - "8000:8000"
    volumes:
      - backend_db_data:/app/data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gestor_frontend
    restart: always
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  backend_db_data:
